name: Database backup

on:
  schedule:
    - cron: '0 16 * * *'  # 2am Sydney time (UTC+10) — cron runs in UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 17
        # Supabase runs Postgres 17; pg_dump refuses to dump from a newer server
        # than itself, and Ubuntu's default postgresql-client package is v16.
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install --yes postgresql-client-17

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$DB_URL" --no-owner --no-privileges --format=plain -f backup.sql
          gzip backup.sql

      - name: Set backup date
        id: vars
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.vars.outputs.date }}
          path: backup.sql.gz
          retention-days: 30
          if-no-files-found: error
