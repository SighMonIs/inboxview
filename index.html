<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PrintDesk</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBETfOa0gAqNtoTnQ5BodrAi6bk2HCD_8c&libraries=places&loading=async" async defer></script>
<script src="config.js" onerror="console.warn('config.js not found — using defaults')"></script>
<link rel="stylesheet" href="styles.css?v=1.1.8">

<script>
// Fallback if config.js missing
window.CONFIG = window.CONFIG || { SUPABASE_URL: '', SUPABASE_KEY: '' };
</script>
</head>

<body>

<!-- ══ Set Password Screen (for invited users) ══ -->
<div id="setPasswordScreen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">PrintDesk</div>
    <div class="login-subtitle">Welcome! Set your password to continue.</div>
    <div id="setPasswordError" class="login-error" style="display:none"></div>
    <div class="field">
      <label>New password</label>
      <input type="password" id="setPasswordInput" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doSetPassword()">
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="setPasswordConfirm" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doSetPassword()">
    </div>
    <button class="btn primary login-submit-btn" id="setPasswordBtn" onclick="doSetPassword()">
      <i class="ti ti-check"></i> Set password &amp; sign in
    </button>
  </div>
</div>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">PrintDesk</div>
    <div class="login-subtitle">Sign in to continue</div>
    <div id="loginError" class="login-error" style="display:none"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="username email" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn primary login-submit-btn" id="loginBtn" onclick="doLogin()">
      <i class="ti ti-login"></i> Sign in
    </button>
  </div>
</div>

<div id="mainApp" style="display:none">

  <!-- Setup banner -->
  <div class="setup-banner" id="setupBanner" style="display:none">
    <h3><i class="ti ti-plug icon-inline-title"></i>Connect to Supabase</h3>
    <p>Enter your Supabase project URL and anon key to connect PrintDesk to your database.</p>
    <div class="url-input-row url-input-row-tight">
      <input type="url" id="gasUrlInput" placeholder="https://xxxxxxxxxxxx.supabase.co">
    </div>
    <div class="url-input-row">
      <input type="text" id="sbKeyInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9&hellip;">
      <button class="btn primary" onclick="saveSupabaseConfig()"><i class="ti ti-check"></i> Connect</button>
    </div>
  </div>

  <!-- Top bar -->
  <nav class="topbar" id="sidebar">
    <div class="topbar-logo" title="PrintDesk">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="3" width="14" height="18" rx="3"></rect>
        <circle cx="12" cy="7.5" r="1.4" fill="currentColor" stroke="none"></circle>
        <line x1="8" y1="13" x2="16" y2="13"></line>
        <line x1="8" y1="16.5" x2="14" y2="16.5"></line>
      </svg>
      <span class="logo">PrintDesk</span>
    </div>
    <div class="topbar-nav">
      <button class="topbar-item active ti-e" data-view="orders" onclick="setSidebarView('orders')" title="Orders">
        <i class="ti ti-inbox"></i><span class="ti-label">Orders</span>
      </button>
      <button class="topbar-item ti-e" data-view="customers" onclick="setSidebarView('customers')" title="Customers">
        <i class="ti ti-address-book"></i><span class="ti-label">Customers</span>
      </button>
      <button class="topbar-item ti-e" data-view="inventory" onclick="setSidebarView('inventory')" title="Inventory">
        <i class="ti ti-package"></i><span class="ti-label">Inventory</span>
      </button>
      <button class="topbar-item ti-e" data-view="stats" onclick="setSidebarView('stats')" title="Stats">
        <i class="ti ti-chart-bar"></i><span class="ti-label">Stats</span>
      </button>
      <button class="topbar-item ti-e" onclick="window.open('/badge/','_blank')" title="Badges (opens in new tab)">
        <i class="ti ti-badge"></i><span class="ti-label">Badges</span><i class="ti ti-external-link external-link-icon"></i>
      </button>
    </div>
    <div class="topbar-end">
      <button class="topbar-item ti-e" data-view="settings" onclick="setSidebarView('settings')" title="Settings">
        <i class="ti ti-settings"></i><span class="ti-label">Settings</span>
      </button>
      <button class="topbar-item topbar-logout ti-e" onclick="doLogout()" title="Sign out">
        <i class="ti ti-logout"></i><span class="ti-label">Sign out</span>
      </button>
    </div>
  </nav>

<div class="inbox-layout" id="mainContent">

  <!-- ── Column 2: Order list ── -->
  <div class="inbox-list-col">
    <div class="inbox-list-header">
      <div class="view-search-row">
        <div class="inbox-search-row inbox-search-row-flex">
          <i class="ti ti-search inbox-search-icon"></i>
          <input type="text" id="search" placeholder="Search&hellip;" oninput="renderTable();toggleSearchClear()">
          <button id="searchClear" class="search-clear-btn" onclick="document.getElementById('search').value='';renderTable();toggleSearchClear()" style="display:none"><i class="ti ti-x"></i></button>
        </div>
        <button class="btn success flex-shrink-0" onclick="openAddModal()"><i class="ti ti-plus"></i> New Order</button>
      </div>
      <div class="inbox-sort-row">
        <div class="filter-wrap" id="filterWrap">
          <button class="sort-btn-main" id="filterBtn" onclick="toggleFilterPanel(event)">
            <i class="ti ti-filter"></i> Filter <span id="filterCount" class="filter-count-badge" style="display:none"></span>
          </button>
          <div class="filter-panel" id="filterPanel" style="display:none">
            <div class="filter-section-title">Status</div>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="Pending" checked onchange="renderTable();updateFilterCount()"> Pending</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="Confirmed" checked onchange="renderTable();updateFilterCount()"> Confirmed</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="Printed" checked onchange="renderTable();updateFilterCount()"> Printed</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="Complete" checked onchange="renderTable();updateFilterCount()"> Complete</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="On Hold" checked onchange="renderTable();updateFilterCount()"> On Hold</label>
            <label class="filter-check"><input type="checkbox" data-filter="status" value="Cancelled" checked onchange="renderTable();updateFilterCount()"> Cancelled</label>
            <div class="filter-section-title filter-section-title-mt10">Category</div>
            <div id="filterCatChecks"></div>
            <div class="filter-section-title filter-section-title-mt10">Payment</div>
            <div id="filterPayChecks"></div>
          </div>
        </div>
        <div class="sort-btn-wrap" id="sortWrap">
          <div class="sort-btn-group">
            <button class="sort-btn-main" id="sortBtn" onclick="toggleSortPanel(event)">
              <i class="ti ti-arrows-sort"></i>
            </button>
            <button class="sort-btn-dir" id="sortDirBtn" onclick="toggleSortDir()" title="Toggle sort direction">
              <i class="ti ti-arrow-up" id="sortDirIcon"></i>
            </button>
          </div>
          <div class="sort-panel" id="sortPanel" style="display:none"></div>
        </div>
      </div>
    </div>
    <div class="inbox-list" id="inboxList">
      <div class="inbox-empty-state"><i class="ti ti-loader-2"></i> Loading&hellip;</div>
    </div>
    <div class="inbox-list-footer">
      <span id="footerVersion">v1.5.0</span>
      <span class="footer-dot-sep">&middot;</span>
      <span id="statusMsg" class="footer-status">Loading&hellip;</span>
    </div>
  </div>

  <!-- ── Column 3: Order detail ── -->
  <div class="inbox-detail-col" id="inboxDetail">
    <div class="inbox-no-selection">
      <i class="ti ti-inbox"></i>
      <p>Select an order</p>
    </div>
  </div>

</div><!-- end inbox-layout/mainContent -->
</div><!-- end mainApp -->


<!-- Badge Batch Panel -->
<div class="floating-panel" id="badgeBatchModal">
  <div class="modal sm">
    <div class="modal-title"><i class="ti ti-badges icon-inline-title"></i>Generate All Badges</div>

    <!-- Choose phase -->
    <div id="badgeBatchChoose">
      <p id="badgeBatchCount" class="badge-batch-count"></p>
      <div class="badge-batch-options">
        <button class="btn badge-batch-option-btn" onclick="generateAllBadges(_batchItems)">
          <i class="ti ti-files badge-batch-option-icon"></i>
          <span><strong id="badgeBatchCountA"></strong> individual .3mf files</span>
        </button>
        <button class="btn primary badge-batch-option-btn" onclick="generateAllBadgesZip(_batchItems)">
          <i class="ti ti-file-zip badge-batch-option-icon"></i>
          <span>Single ZIP containing all files</span>
        </button>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeBadgeBatchModal()">Cancel</button>
      </div>
    </div>

    <!-- Progress phase -->
    <div id="badgeBatchProgress" style="display:none">
      <p id="badgeBatchProgressLabel" class="badge-batch-progress-label"></p>
      <div class="badge-batch-progress-track">
        <div id="badgeBatchBar" class="badge-batch-progress-fill" style="width:0%"></div>
      </div>
      <p id="badgeBatchProgressSub" class="badge-batch-progress-sub"></p>
    </div>

    <!-- Done phase -->
    <div id="badgeBatchDone" style="display:none">
      <p id="badgeBatchDoneMsg" class="badge-batch-done-msg"></p>
      <p id="badgeBatchDoneSub" class="badge-batch-done-sub"></p>
      <div class="modal-actions">
        <button class="btn primary" onclick="closeBadgeBatchModal()">Close</button>
      </div>
    </div>
  </div>
</div>


<!-- ══ Confirm Dialog ══ -->
<div class="floating-panel" id="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn" id="confirmCancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<!-- Type-to-confirm Delete Dialog -->
<div class="floating-panel" id="typeConfirmDialog">
  <div class="confirm-box type-confirm-box">
    <div class="confirm-msg type-confirm-msg" id="typeConfirmMsg"></div>
    <input type="text" id="typeConfirmInput" placeholder="" class="type-confirm-input" oninput="typeConfirmCheck()">
    <div class="confirm-actions">
      <button class="btn" onclick="closeTypeConfirm()">Cancel</button>
      <button class="btn danger" id="typeConfirmOk" disabled onclick="typeConfirmSubmit()">Delete Order</button>
    </div>
  </div>
</div>

<!-- Undo toast -->
<div class="undo-toast" id="undoToast" style="display:none">
  <span id="undoToastMsg"></span>
  <button class="btn sm" onclick="_undoToastAction()">Undo</button>
</div>

<script src="api.js?v=1.1.2"></script>
<script src="ui.js?v=1.1.4"></script>
<script src="app.js?v=1.1.4"></script>
</body>
</html>
